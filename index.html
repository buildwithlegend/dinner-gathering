<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>揪團報名系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background-color: #f7f9fc; color: #333; }
        h1, h2 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #2980b9; }
        .event-item { border-left: 5px solid #2ecc71; padding-left: 15px; margin-bottom: 20px; background: #fff; }
        .event-title { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .event-meta { font-size: 14px; color: #7f8c8d; margin: 5px 0; }
        .join-box { display: flex; gap: 10px; margin-top: 10px; }
        .join-box input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .join-box button { width: auto; padding: 8px 15px; background: #2ecc71; }
        .join-box button:hover { background: #27ae60; }
        .attendees { margin-top: 10px; font-size: 14px; background: #f8f9fa; padding: 10px; border-radius: 6px; }
        .tag { display: inline-block; background: #e1f5fe; color: #0288d1; padding: 3px 8px; border-radius: 4px; margin-right: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>附帶資料庫的簡易揪團報名系統</h1>

    <div class="card">
        <h2>➕ 發起新活動（每個人都可以開）</h2>
        <div class="form-group">
            <label>活動主題 / 吃飯目的</label>
            <input type="text" id="eventTitle" placeholder="例如：今天晚上8點吃晚餐">
        </div>
        <div class="form-group">
            <label>集合地點</label>
            <input type="text" id="eventLocation" placeholder="例如：高雄左營XX路321號">
        </div>
        <button onclick="createEvent()">發布活動</button>
    </div>

    <h2>📋 所有活動與報名歷史紀錄</h2>
    <div id="eventList">載入活動中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🟢 這是測試用的免設定資料庫配置，可直接運作。
        const firebaseConfig = {
            authDomain: "quiz-demo-4482b.firebaseapp.com",
            projectId: "quiz-demo-4482b",
            storageBucket: "quiz-demo-4482b.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 為每個瀏覽器產生一個獨一無二的「匿名用戶ID」，用來識別身份防止重複報名，並允許修改
        if (!localStorage.getItem('userId')) {
            localStorage.setItem('userId', 'user_' + Math.random().toString(36).substr(2, 9));
        }
        const myUserId = localStorage.getItem('userId');

        // 【功能：發起新活動】
        window.createEvent = async function() {
            const title = document.getElementById('eventTitle').value.trim();
            const location = document.getElementById('eventLocation').value.trim();

            if (!title || !location) { alert('請填寫完整的主題與地點！'); return; }

            try {
                await addDoc(collection(db, "events"), {
                    title: title,
                    location: location,
                    createdAt: serverTimestamp(),
                    attendees: {} // 結構為 { userId: name }
                });
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventLocation').value = '';
                alert('活動發布成功！');
            } catch (e) {
                alert('發布失敗: ' + e);
            }
        }

        // 【功能：提交/修改報名】
        window.joinEvent = async function(eventId) {
            const nameInput = document.getElementById(`name-${eventId}`);
            const name = nameInput.value.trim();
            if (!name) { alert('請輸入您的姓名！'); return; }

            const eventRef = doc(db, "events", eventId);
            
            // 動態更新該活動底下的名單，利用 myUserId 作為 Key，實現「重複送出直接覆蓋修改」
            const updateData = {};
            updateData[`attendees.${myUserId}`] = name;

            try {
                await updateDoc(eventRef, updateData);
                nameInput.value = '';
                alert('報名/修改成功！');
            } catch (e) {
                alert('報名失敗: ' + e);
            }
        }

        // 【功能：即時監聽並更新活動列表 (包含過往紀錄)】
        onSnapshot(collection(db, "events"), (snapshot) => {
            const eventListDiv = document.getElementById('eventList');
            eventListDiv.innerHTML = '';

            // 按時間排序（最新發起的在最上面）
            const docs = snapshot.docs.sort((a, b) => {
                const timeA = a.data().createdAt?.seconds || 0;
                const timeB = b.data().createdAt?.seconds || 0;
                return timeB - timeA;
            });

            if (docs.length === 0) {
                eventListDiv.innerHTML = '<p style="text-align:center; color:#999;">目前沒有任何活動紀錄。</p>';
                return;
            }

            docs.forEach(doc => {
                const event = doc.data();
                const eventId = doc.id;
                
                // 解析報名名單
                const attendeeMap = event.attendees || {};
                const attendeeNames = Object.values(attendeeMap);
                const myCurrentName = attendeeMap[myUserId] || ''; // 檢查自己有沒有填過

                const card = document.createElement('div');
                card.className = 'card event-item';
                
                card.innerHTML = `
                    <div class="event-title">${event.title}</div>
                    <div class="event-meta">📍 地點：${event.location}</div>
                    <div class="attendees">
                        <strong>👥 已報名名單 (${attendeeNames.length}人)：</strong>
                        <div>${attendeeNames.length > 0 ? attendeeNames.map(n => `<span class="tag">${n}</span>`).join('') : '暫無人報名'}</div>
                    </div>
                    <div class="join-box">
                        <input type="text" id="name-${eventId}" placeholder="${myCurrentName ? `已報名為：${myCurrentName} (再次輸入可修改)` : '輸入姓名報名'}" />
                        <button onclick="joinEvent('${eventId}')">${myCurrentName ? '修改名單' : '我要報名'}</button>
                    </div>
                `;
                eventListDiv.appendChild(card);
            });
        });
    </script>
</body>
</html>
