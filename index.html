<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上抽獎系統</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        input { width: calc(100% - 20px); padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .admin-btn { background: #6c757d; margin-top: 20px; }
        .admin-btn:hover { background: #5a6268; }
        .success { color: #28a745; font-weight: bold; }
        .winner-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 6px; margin-top: 20px; color: #856404; font-weight: bold; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
        th { background: #e9ecef; }
    </style>
</head>
<body>

<div class="card">
    <!-- 參與者填寫區 -->
    <div id="user-view">
        <h2>🎉 活動抽獎登記</h2>
        <div id="form-container">
            <p>請輸入您的帳號名稱與對應代號</p>
            <input type="text" id="username" placeholder="帳號名稱" required>
            <input type="text" id="code" placeholder="代號 (例如: A01)" required style="text-transform: uppercase;">
            <button onclick="registerCode()">確認送出</button>
        </div>
        <div id="msg-container"></div>
        <button class="admin-btn" onclick="requestAdminAccess()">切換至管理者後台</button>
    </div>

    <!-- 管理者後台區 -->
    <div id="admin-view" class="hidden">
        <h2>👑 管理者抽獎控制台</h2>
        <button style="background: #dc3545;" onclick="drawWinner()">開始抽獎！</button>
        <div id="winner-display" class="winner-box hidden"></div>
        
        <h3>目前登記名單</h3>
        <table>
            <thead>
                <tr>
                    <th>代號</th>
                    <th>號碼</th>
                    <th>登記帳號</th>
                </tr>
            </thead>
            <tbody id="admin-table-body">
                <!-- 動態載入 -->
            </tbody>
        </table>
        <button class="admin-btn" onclick="toggleAdmin()">返回填寫頁面</button>
    </div>
</div>

<!-- 引入 Firebase SDK (使用 v10 模組化版本) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ 請替換成你自己的 Firebase 專案設定
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔐 設定你的管理者密碼（可自行修改）
    const ADMIN_PASSWORD = "my_secret_password_123";

    // 處理帳號遮罩的函式 (首尾保留，中間轉成 *)
    function maskUsername(name) {
        if (!name) return "";
        if (name.length <= 1) return name;
        if (name.length === 2) return name[0] + "*";
        
        const firstChar = name[0];
        const lastChar = name[name.length - 1];
        const stars = "*".repeat(name.length - 2);
        return firstChar + stars + lastChar;
    }

    // 參與者登記功能
    window.registerCode = async function() {
        if (localStorage.getItem('lottery_submitted') === 'true') {
            alert("⚠️ 偵測到此裝置已經填寫過了，每個裝置只有一次機會！");
            return;
        }

        const username = document.getElementById('username').value.trim();
        const inputCode = document.getElementById('code').value.trim().toUpperCase();
        const msgContainer = document.getElementById('msg-container');

        if (!username || !inputCode) {
            alert("請完整填寫帳號與代號！");
            return;
        }

        const codeRef = doc(db, "codes", inputCode);

        try {
            await runTransaction(db, async (transaction) => {
                const codeDoc = await transaction.get(codeRef);
                
                if (!codeDoc.exists()) {
                    throw new Error("NOT_FOUND");
                }
                
                const data = codeDoc.data();
                if (data.status === "taken") {
                    throw new Error("ALREADY_TAKEN");
                }

                transaction.update(codeRef, {
                    user: username,
                    status: "taken"
                });
            });

            localStorage.setItem('lottery_submitted', 'true');
            document.getElementById('form-container').classList.add('hidden');
            msgContainer.innerHTML = `<p class="success">🎉 登記成功！<br>您已成功綁定代號：${inputCode}</p>`;

        } catch (error) {
            if (error.message === "NOT_FOUND") {
                alert("⚠️ 警告：查無此代號，請重新輸入！");
            } else if (error.message === "ALREADY_TAKEN") {
                alert("⚠️ 警告：此代號已經被人填寫過了，請重新輸入其他代號！");
            } else {
                alert("發生未預期的錯誤：" + error.message);
            }
        }
    };

    // 驗證密碼並進入後台
    window.requestAdminAccess = function() {
        const inputPass = prompt("請輸入管理者密碼：");
        if (inputPass === null) return; // 按取消

        if (inputPass === ADMIN_PASSWORD) {
            toggleAdmin();
        } else {
            alert("❌ 密碼錯誤，拒絕存取！");
        }
    };

    function toggleAdmin() {
        const userView = document.getElementById('user-view');
        const adminView = document.getElementById('admin-view');
        
        userView.classList.toggle('hidden');
        adminView.classList.toggle('hidden');

        if (!adminView.classList.contains('hidden')) {
            loadAdminTable();
        }
    }
    window.toggleAdmin = toggleAdmin; 

    async function loadAdminTable() {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = '<tr><td colspan="3">載入中...</td></tr>';

        try {
            const querySnapshot = await getDocs(collection(db, "codes"));
            tbody.innerHTML = '';
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${docSnap.id}</td>
                    <td>${data.number || '-'}</td>
                    <td>${data.user ? data.user : '<span style="color:#ccc;">尚未登記</span>'}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="3">載入失敗：${e.message}</td></tr>`;
        }
    }

    window.drawWinner = async function() {
        try {
            const querySnapshot = await getDocs(collection(db, "codes"));
            let validEntries = [];
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.status === "taken") {
                    validEntries.push({ id: docSnap.id, ...data });
                }
            });

            const winnerDisplay = document.getElementById('winner-display');
            if (validEntries.length === 0) {
                winnerDisplay.classList.remove('hidden');
                winnerDisplay.innerText = "目前尚無任何有效登記資料！";
                return;
            }

            const winner = validEntries[Math.floor(Math.random() * validEntries.length)];
            
            // 套用遮罩處理中獎帳號
            const maskedUser = maskUsername(winner.user);

            winnerDisplay.classList.remove('hidden');
            winnerDisplay.innerHTML = `🏆 恭喜中獎！<br>帳號：${maskedUser} (代號: ${winner.id} / 號碼: ${winner.number})`;
        } catch (e) {
            alert("抽獎過程發生錯誤：" + e.message);
        }
    };

    if (localStorage.getItem('lottery_submitted') === 'true') {
        document.getElementById('form-container').classList.add('hidden');
        document.getElementById('msg-container').innerHTML = `<p class="success">您已經完成登記囉！請等待抽獎結果。</p>`;
    }
</script>

</body>
</html>
