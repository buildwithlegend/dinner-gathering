<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免伺服器 隨時揪團報名系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background-color: #f7f9fc; color: #333; }
        h1, h2 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .datetime-group { display: flex; gap: 10px; }
        .datetime-group input { flex: 1; }
        button { background: #3498db; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #2980b9; }
        .event-item { border-left: 5px solid #2ecc71; padding-left: 15px; margin-bottom: 20px; }
        .event-title { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .event-meta { font-size: 14px; color: #7f8c8d; margin: 5px 0; }
        .join-box { display: flex; gap: 10px; margin-top: 12px; }
        .join-box input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .join-box button { width: auto; padding: 8px 15px; background: #2ecc71; }
        .join-box button:hover { background: #27ae60; }
        .attendees { margin-top: 10px; font-size: 14px; background: #f8f9fa; padding: 10px; border-radius: 6px; }
        .tag { display: inline-block; background: #e1f5fe; color: #0288d1; padding: 3px 8px; border-radius: 4px; margin-right: 5px; font-size: 13px; font-weight: 500; }
        .sync-box { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        textarea { width: 100%; height: 60px; margin-bottom: 10px; padding: 8px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>📅 100% 可行版：隨時揪團報名系統</h1>

    <div class="card sync-box">
        <h3>🔄 同步與載入過往紀錄</h3>
        <p style="font-size: 13px; margin-top: -5px;">把朋友傳給你的「同步代碼」貼在下面並點擊匯入，即可同步所有人開的活動與名單！</p>
        <textarea id="syncInput" placeholder="在此貼上朋友分享的同步代碼..."></textarea>
        <button style="background: #e67e22;" onclick="importData()">📥 匯入並同步紀錄</button>
    </div>

    <div class="card">
        <h2>➕ 發起新活動（每個人都可以開）</h2>
        <div class="form-group">
            <label>活動主題 / 吃飯目的</label>
            <input type="text" id="eventTitle" placeholder="例如：聚餐吃晚餐、唱歌團">
        </div>
        <div class="form-group">
            <label>設定日期與時間</label>
            <div class="datetime-group">
                <input type="date" id="eventDate">
                <input type="time" id="eventTime">
            </div>
        </div>
        <div class="form-group">
            <label>集合地點</label>
            <input type="text" id="eventLocation" placeholder="例如：高雄左營XX路321號">
        </div>
        <button onclick="createEvent()">發布活動</button>
    </div>

    <h2>📋 所有活動與報名歷史紀錄</h2>
    <div id="eventList"></div>

    <div class="card" id="exportCard" style="display:none; background: #d4edda; color: #155724; border: 1px solid #c3e6cb;">
        <h3>🔗 分享給朋友的同步代碼</h3>
        <p style="font-size: 13px;">複製下方整串文字傳給朋友，他們匯入後就能看到你新開的活動或報名名字！</p>
        <textarea id="exportOutput" readonly onclick="this.select()"></textarea>
        <button style="background: #28a745;" onclick="copySyncCode()">📋 一鍵複製同步代碼</button>
    </div>

    <script>
        let globalData = { events: [] };

        // 產生唯一使用者 ID (防重複填寫，可修改)
        if (!localStorage.getItem('userId')) {
            localStorage.setItem('userId', 'user_' + Math.random().toString(36).substr(2, 9));
        }
        const myUserId = localStorage.getItem('userId');

        // 初始化：讀取自己電腦的舊紀錄
        function loadLocalData() {
            const local = localStorage.getItem('gathering_data');
            if (local) {
                try { globalData = JSON.parse(local); } catch(e) { globalData = { events: [] }; }
            }
            renderEvents();
            updateExportCode();
        }

        // 儲存到本地並刷新
        function saveLocalData() {
            localStorage.setItem('gathering_data', JSON.stringify(globalData));
            renderEvents();
            updateExportCode();
        }

        // 繪製畫面
        function renderEvents() {
            const eventListDiv = document.getElementById('eventList');
            eventListDiv.innerHTML = '';

            const events = globalData.events || [];
            if (events.length === 0) {
                eventListDiv.innerHTML = '<p style="text-align:center; color:#999;">目前沒有任何活動紀錄。請在上方發起新活動！</p>';
                return;
            }

            // 最新發布的排在最上面
            [...events].reverse().forEach((event) => {
                const attendeeMap = event.attendees || {};
                const attendeeNames = Object.values(attendeeMap);
                const myCurrentName = attendeeMap[myUserId] || ''; 

                const card = document.createElement('div');
                card.className = 'card event-item';
                
                card.innerHTML = `
                    <div class="event-title">${event.title}</div>
                    <div class="event-meta">📅 時間：${event.date || '未定'} ${event.time || ''}</div>
                    <div class="event-meta">📍 地點：${event.location}</div>
                    <div class="attendees">
                        <strong>👥 已報名名單 (${attendeeNames.length}人)：</strong>
                        <div>${attendeeNames.length > 0 ? attendeeNames.map(n => `<span class="tag">${n}</span>`).join('') : '暫無人報名'}</div>
                    </div>
                    <div class="join-box">
                        <input type="text" id="name-${event.id}" placeholder="${myCurrentName ? `已填：${myCurrentName} (重新輸入可修改)` : '輸入姓名報名'}" />
                        <button onclick="joinEvent('${event.id}')">${myCurrentName ? '修改名字' : '我要報名'}</button>
                    </div>
                `;
                eventListDiv.appendChild(card);
            });
        }

        // 【功能：發起新活動】
        function createEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const location = document.getElementById('eventLocation').value.trim();

            if (!title || !date || !time || !location) { 
                alert('請填寫完整的主題、日期、時間與地點！'); 
                return; 
            }

            const newEvent = {
                id: 'evt_' + Date.now(),
                title: title,
                date: date,
                time: time,
                location: location,
                attendees: {}
            };

            if (!globalData.events) globalData.events = [];
            globalData.events.push(newEvent);

            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = '';
            document.getElementById('eventTime').value = '';
            document.getElementById('eventLocation').value = '';

            saveLocalData();
            alert('活動成功建立在您的列表！請複製最下方的同步代碼分享給朋友！');
        }

        // 【功能：報名/修改名字】
        function joinEvent(eventId) {
            const nameInput = document.getElementById(`name-${eventId}`);
            const name = nameInput.value.trim();
            if (!name) { alert('請輸入您的姓名！'); return; }

            const event = globalData.events.find(e => e.id === eventId);
            if (event) {
                if (!event.attendees) event.attendees = {};
                event.attendees[myUserId] = name; // 重複提交會直接覆蓋修改
                nameInput.value = '';
                saveLocalData();
                alert('報名/修改成功！請複製最下方的最新同步代碼分享出去！');
            }
        }

        // 【功能：更新匯出代碼】
        function updateExportCode() {
            const exportCard = document.getElementById('exportCard');
            const exportOutput = document.getElementById('exportOutput');
            if (globalData.events && globalData.events.length > 0) {
                exportCard.style.display = 'block';
                // 將資料做簡單加密編碼成文字串
                exportOutput.value = btoa(encodeURIComponent(JSON.stringify(globalData)));
            } else {
                exportCard.style.display = 'none';
            }
        }

        // 【功能：一鍵複製】
        function copySyncCode() {
            const exportOutput = document.getElementById('exportOutput');
            exportOutput.select();
            document.execCommand('copy');
            alert('代碼已複製！可以傳給 LINE 朋友了！');
        }

        // 【功能：匯入別人的資料並合併紀錄】
        function importData() {
            const code = document.getElementById('syncInput').value.trim();
            if (!code) { alert('請先貼上代碼！'); return; }
            try {
                const decodedData = JSON.parse(decodeURIComponent(atob(code)));
                if (decodedData && decodedData.events) {
                    
                    // 智慧合併演算法：如果活動一樣就更新名單，不一樣就新增
                    decodedData.events.forEach(incomingEvent => {
                        const existingEvent = globalData.events.find(e => e.id === incomingEvent.id);
                        if (existingEvent) {
                            // 合併報名名單
                            existingEvent.attendees = { ...existingEvent.attendees, ...incomingEvent.attendees };
                        } else {
                            globalData.events.push(incomingEvent);
                        }
                    });

                    saveLocalData();
                    document.getElementById('syncInput').value = '';
                    alert('🔄 歷史紀錄與名單同步成功！');
                }
            } catch(e) {
                alert('代碼錯誤或不完整，請重新複製再試！');
            }
        }

        // 開啟網頁自動載入
        loadLocalData();
    </script>
</body>
</html>
        loadData();
    </script>
</body>
</html>
