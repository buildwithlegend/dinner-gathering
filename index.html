<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上抽獎系統</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; }
        input { width: calc(100% - 20px); padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .admin-btn { background: #6c757d; margin-top: 20px; }
        .admin-btn:hover { background: #5a6268; }
        .delete-btn { background: #dc3545; padding: 6px 10px; font-size: 13px; width: auto; margin: 0; }
        .delete-btn:hover { background: #c82333; }
        .success { color: #28a745; font-weight: bold; }
        .winner-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 6px; margin-top: 20px; color: #856404; font-weight: bold; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: center; vertical-align: middle; }
        th { background: #e9ecef; }
    </style>
</head>
<body>

<div class="card">
    <!-- 參與者填寫區 -->
    <div id="user-view">
        <h2>🎉 活動抽獎登記</h2>
        <div id="form-container">
            <p>請輸入您的帳號名稱與自訂代號</p>
            <input type="text" id="username" placeholder="帳號名稱" required>
            <input type="text" id="code" placeholder="代號 (例如: A01)" required style="text-transform: uppercase;">
            <button onclick="registerCode()">確認送出</button>
        </div>
        <div id="msg-container"></div>
        <button class="admin-btn" onclick="requestAdminAccess()">切換至管理者後台</button>
    </div>

    <!-- 管理者後台區 -->
    <div id="admin-view" class="hidden">
        <h2>👑 管理者抽獎控制台</h2>
        <button style="background: #dc3545;" onclick="drawWinner()">開始抽獎！</button>
        <div id="winner-display" class="winner-box hidden"></div>
        
        <h3>目前登記名單</h3>
        <table>
            <thead>
                <tr>
                    <th>代號</th>
                    <th>登記帳號</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="admin-table-body">
                <!-- 動態載入 -->
            </tbody>
        </table>
        <button class="admin-btn" onclick="toggleAdmin()">返回填寫頁面</button>
    </div>
</div>

<!-- 引入 Firebase SDK (Realtime Database 版本) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDfEnsCez2ywbt0NQ4jPBUUr8oAIcIwyA0",
        authDomain: "account-management-dashb-b4373.firebaseapp.com",
        databaseURL: "https://account-management-dashb-b4373-default-rtdb.firebaseio.com",
        projectId: "account-management-dashb-b4373",
        storageBucket: "account-management-dashb-b4373.firebasestorage.app",
        messagingSenderId: "294482078870",
        appId: "1:294482078870:web:f75ff744e13f8f5c5f26b7",
        measurementId: "G-9JHT96DE94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ADMIN_PASSWORD = "my_secret_password_123";

    function maskUsername(name) {
        if (!name) return "";
        if (name.length <= 1) return name;
        if (name.length === 2) return name[0] + "*";
        
        const firstChar = name[0];
        const lastChar = name[name.length - 1];
        const stars = "*".repeat(name.length - 2);
        return firstChar + stars + lastChar;
    }

    // 登記功能
    window.registerCode = async function() {
        const username = document.getElementById('username').value.trim();
        const inputCode = document.getElementById('code').value.trim().toUpperCase();

        if (!username || !inputCode) {
            alert("請完整填寫帳號與代號！");
            return;
        }

        const codeRef = ref(db, 'codes/' + inputCode);

        try {
            await set(codeRef, {
                user: username,
                status: "taken",
                timestamp: Date.now()
            });

            alert(`🎉 成功登記/更新代號：[${inputCode}]！`);
            document.getElementById('code').value = '';
            document.getElementById('username').value = '';

        } catch (error) {
            alert("發生未預期的錯誤：" + error.message);
        }
    };

    window.requestAdminAccess = function() {
        const inputPass = prompt("請輸入管理者密碼：");
        if (inputPass === null) return;

        if (inputPass === ADMIN_PASSWORD) {
            toggleAdmin();
        } else {
            alert("❌ 密碼錯誤，拒絕存取！");
        }
    };

    function toggleAdmin() {
        const userView = document.getElementById('user-view');
        const adminView = document.getElementById('admin-view');
        
        userView.classList.toggle('hidden');
        adminView.classList.toggle('hidden');

        if (!adminView.classList.contains('hidden')) {
            loadAdminTable();
        }
    }
    window.toggleAdmin = toggleAdmin; 

    async function loadAdminTable() {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = '<tr><td colspan="3">載入中...</td></tr>';

        try {
            const snapshot = await get(ref(db, 'codes'));
            tbody.innerHTML = '';
            
            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="3">目前尚無人登記</td></tr>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const codeId = childSnapshot.key;
                const data = childSnapshot.val();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${codeId}</td>
                    <td>${data.user || '-'}</td>
                    <td><button class="delete-btn" onclick="deleteEntry('${codeId}')">刪除</button></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="3">載入失敗：${e.message}</td></tr>`;
        }
    }

    // 刪除指定的代號資料
    window.deleteEntry = async function(codeId) {
        if (!confirm(`確定要刪除代號 [${codeId}] 嗎？`)) {
            return;
        }

        try {
            await remove(ref(db, 'codes/' + codeId));
            alert(`已成功刪除代號 [${codeId}]`);
            loadAdminTable(); // 重新整理表格
        } catch (e) {
            alert("刪除失敗：" + e.message);
        }
    };

    window.drawWinner = async function() {
        try {
            const snapshot = await get(ref(db, 'codes'));
            let validEntries = [];
            
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    validEntries.push({ id: childSnapshot.key, ...data });
                });
            }

            const winnerDisplay = document.getElementById('winner-display');
            if (validEntries.length === 0) {
                winnerDisplay.classList.remove('hidden');
                winnerDisplay.innerText = "目前尚無任何有效登記資料！";
                return;
            }

            const winner = validEntries[Math.floor(Math.random() * validEntries.length)];
            const maskedUser = maskUsername(winner.user);

            winnerDisplay.classList.remove('hidden');
            winnerDisplay.innerHTML = `🏆 恭喜中獎！<br>帳號：${maskedUser} (代號: ${winner.id})`;
        } catch (e) {
            alert("抽獎過程發生錯誤：" + e.message);
        }
    };
</script>

</body>
</html>
